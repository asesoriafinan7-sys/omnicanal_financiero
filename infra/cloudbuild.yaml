# ─────────────────────────────────────────────────────────────────────────────
# cloudbuild.yaml — Pipeline CI/CD para Google Cloud Build
# Flujo: Build → Push → Deploy a Cloud Run
# ─────────────────────────────────────────────────────────────────────────────
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: omnicanal-financiero
  _IMAGE: gcr.io/$PROJECT_ID/omnicanal-financiero

steps:
  # ── Paso 1: Build de la imagen Docker ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "$_IMAGE:$SHORT_SHA"
      - "-t"
      - "$_IMAGE:latest"
      - "."
    id: "build-image"

  # ── Paso 2: Push al Container Registry ────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "$_IMAGE"
    id: "push-image"
    waitFor: ["build-image"]

  # ── Paso 3: Deploy a Cloud Run ────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "$_SERVICE_NAME"
      - "--image=$_IMAGE:$SHORT_SHA"
      - "--region=$_REGION"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=2Gi"
      - "--cpu=2"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--timeout=300"
      - "--concurrency=80"
      - "--set-env-vars=APP_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "--service-account=omnicanal-sa@$PROJECT_ID.iam.gserviceaccount.com"
    id: "deploy-cloudrun"
    waitFor: ["push-image"]

images:
  - "$_IMAGE:$SHORT_SHA"
  - "$_IMAGE:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: "1200s"
